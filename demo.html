<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aureva — Pipeline Console (Interactive Demo)</title>
<style>
* { box-sizing: border-box; margin: 0; }
:root {
  --bg: #0e1116; --panel: #161b23; --panel2: #1d242f; --line: #2a3341;
  --text: #dbe2ec; --dim: #8b96a5; --accent: #d4a24c; --accent2: #4c9ed4;
  --ok: #3fae6a; --warn: #d4884c; --bad: #d45050;
}
body { background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, "Segoe UI", sans-serif; }
#app { display: flex; min-height: 100vh; }

#sidebar { width: 230px; background: var(--panel); border-right: 1px solid var(--line); padding: 16px 12px; flex-shrink: 0; }
.brand { font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-bottom: 4px; }
.brand span { display: block; font-weight: 400; letter-spacing: 0; color: var(--dim); font-size: 11px; }
#btn-new-client { width: 100%; margin: 14px 0; }
#client-list a { display: block; padding: 8px 10px; border-radius: 6px; color: var(--text); text-decoration: none; margin-bottom: 4px; border: 1px solid transparent; }
#client-list a.sel { background: var(--panel2); border-color: var(--line); }
#client-list a small { display: block; color: var(--dim); }

#main { flex: 1; padding: 20px 26px; max-width: 1100px; }
h1 { font-size: 20px; margin-bottom: 2px; }
h2 { font-size: 15px; margin: 18px 0 8px; color: var(--accent); }
h3 { font-size: 13px; margin: 12px 0 6px; }
.dim { color: var(--dim); font-size: 12px; }

.tabs { display: flex; gap: 4px; margin: 16px 0; flex-wrap: wrap; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.tabs button { background: transparent; border: 1px solid transparent; color: var(--dim); }
.tabs button.sel { background: var(--panel2); color: var(--text); border-color: var(--line); }

button { background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
button:hover { border-color: var(--accent); }
button.primary { background: var(--accent); color: #14100a; border-color: var(--accent); font-weight: 600; }
button.danger { border-color: var(--bad); color: var(--bad); }
button:disabled { opacity: .45; cursor: default; }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
.card h3 { margin: 0 0 4px; }
.card .num { font-size: 11px; color: var(--dim); }
.card p { font-size: 12px; color: var(--dim); margin: 6px 0 10px; min-height: 34px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
th { color: var(--dim); font-weight: 500; font-size: 12px; }

.badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; border: 1px solid; white-space: nowrap; }
.b-PASS, .b-approved, .b-published, .b-resolved, .b-low { color: var(--ok); border-color: var(--ok); }
.b-NEEDS_REVIEW, .b-pending_approval, .b-pending_client_review, .b-pending_review, .b-draft, .b-medium, .b-INFO { color: var(--accent2); border-color: var(--accent2); }
.b-FAIL, .b-flagged, .b-open, .b-high { color: var(--warn); border-color: var(--warn); }
.b-ESCALATE_TO_HUMAN, .b-escalated, .b-rejected { color: var(--bad); border-color: var(--bad); }

form.panel, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; max-width: 560px; }
label { display: block; margin: 10px 0 3px; font-size: 12px; color: var(--dim); }
input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 7px 9px; font-size: 13px; }
.row { display: flex; gap: 8px; align-items: center; }
.check { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.check input { width: auto; }

#toast { position: fixed; bottom: 18px; right: 18px; max-width: 440px; background: var(--panel2); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 14px; font-size: 13px; display: none; z-index: 40; box-shadow: 0 6px 24px rgba(0,0,0,.5); }
#toast.show { display: block; }

#modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; z-index: 30; overflow: auto; padding: 40px 20px; }
#modal-wrap.show { display: block; }

pre { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px; overflow: auto; font-size: 12px; white-space: pre-wrap; }
.mono { font-family: ui-monospace, monospace; font-size: 12px; }
.empty { color: var(--dim); padding: 24px; text-align: center; border: 1px dashed var(--line); border-radius: 8px; margin-top: 10px; }
.cite-yes { color: var(--ok); } .cite-no { color: var(--bad); }
.cite-nobody { color: var(--accent); }
.b-visible { color: var(--ok); border-color: var(--ok); }
.b-hidden { color: var(--accent); border-color: var(--accent); }

#demo-banner { background: linear-gradient(90deg, #2a2214, #161b23); border-bottom: 1px solid var(--accent); padding: 8px 16px; font-size: 12px; color: var(--dim); display: flex; gap: 12px; align-items: center; }
#demo-banner strong { color: var(--accent); }
#demo-banner button { padding: 3px 10px; font-size: 12px; }
#demo-banner button:first-of-type { margin-left: auto; }

<script>
const __modules = {};
function __define(name, fn) {
  const module = { exports: {} };
  fn(module, module.exports, __require);
  __modules[name] = module.exports;
}
function __require(p) {
  const name = p.split('/').pop().replace(/\.js$/, '');
  if (name === 'crypto') {
    return { randomBytes: (n) => ({ toString: () =>
      Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b => b.toString(16).padStart(2, '0')).join('') }) };
  }
  if (!__modules[name]) throw new Error('demo module not found: ' + name);
  return __modules[name];
}

__define('util', function (module, exports, require) {
'use strict';
const crypto = require('crypto');

// FNV-1a — stable deterministic hash for all mock adapters
function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h;
}

function uid(prefix) {
  return `${prefix}_${crypto.randomBytes(5).toString('hex')}`;
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);
}

function now() {
  return new Date().toISOString();
}

module.exports = { fnv1a, uid, slugify, now };

});

__define('mock', function (module, exports, require) {
'use strict';
// Deterministic mock adapters for every external service in the brief.
// Live implementations (Google Ads, DataForSEO, GSC, GA4, Ahrefs, WordPress REST,
// IndexNow, Anthropic LLM, per-engine citation checks, site crawler) replace these
// one-for-one: same function signatures, real transport.
const { fnv1a, slugify, now } = require('../util');

const ENGINES = ['chatgpt', 'gemini', 'perplexity', 'google_ai_overview'];
// July 2026 update §2.3: robots.txt must explicitly allow all six.
const REQUIRED_BOTS = ['GPTBot', 'ClaudeBot', 'PerplexityBot', 'Googlebot', 'Gemini-Bot', 'Bingbot'];

// ---- Research adapters -----------------------------------------------------

// Google Ads API mock — volume/competition/CPC per keyword.
// Competition is template-driven so long-tail-first prioritization is meaningful:
// head terms are high competition, modifiers are medium/low.
function expandKeywords(seed) {
  const variants = [
    { kw: seed, competition: 'high' },
    { kw: `best ${seed}`, competition: 'medium' },
    { kw: `${seed} guide`, competition: 'low' },
    { kw: `how to handle ${seed}`, competition: 'low' },
    { kw: `${seed} for startups`, competition: 'low' }
  ];
  return variants.map(v => {
    const h = fnv1a(v.kw);
    return {
      keyword: v.kw,
      volume: v.competition === 'high' ? 5000 + (h % 20000) : 100 + (h % 1900),
      competition: v.competition,
      cpc: +(0.5 + (h % 700) / 100).toFixed(2),
      intent: h % 2 === 0 ? 'both' : 'ai', // DataForSEO mock: AI-engine intent mapping
      source: 'seed_expansion'
    };
  });
}

// Google Autocomplete mock — conversational long-tail queries.
function autocomplete(seed) {
  return ['what is', 'is it worth', 'checklist for'].map(prefix => {
    const kw = `${prefix} ${seed}`;
    const h = fnv1a(kw);
    return {
      keyword: kw, volume: 50 + (h % 450), competition: 'low',
      cpc: +(0.2 + (h % 300) / 100).toFixed(2),
      intent: 'ai', source: 'autocomplete'
    };
  });
}

// Ahrefs mock — competitor content-gap analysis.
function competitorGaps(competitors, niche) {
  return competitors.slice(0, 2).map((comp, i) => {
    const kw = `${niche} ${['mistakes to avoid', 'cost breakdown'][i % 2]}`;
    const h = fnv1a(comp + kw);
    return {
      keyword: kw, volume: 80 + (h % 700), competition: 'low',
      cpc: +(0.3 + (h % 400) / 100).toFixed(2),
      intent: 'both', source: 'competitor_gap', gapFrom: comp
    };
  });
}

// DataForSEO mock — fan-out sub-questions AI engines use for a topic.
function fanOutQueries(keyword) {
  return [`${keyword} explained`, `${keyword} pros and cons`, `${keyword} examples`];
}

// ---- Baseline audit adapters (Agent 0) ---------------------------------------

// Site crawler mock — the client's pre-existing pages, as found at onboarding.
// Legacy content is deliberately imperfect: thin pages, one JS-rendered page,
// one orphan, missing schema, and fact claims that disagree with each other
// (their values derive from the URL, not the client, so they conflict both with
// each other and — sometimes — with what the writer produces later).
function existingSite(client) {
  const mk = (path, title, opts = {}) => {
    const h = fnv1a(client.domain + path);
    return {
      url: `https://${client.domain}${path}`,
      title,
      wordCount: opts.thin ? 300 + (h % 400) : 900 + (h % 900),
      hasSchema: !!opts.schema,
      jsRendered: !!opts.jsRendered,
      orphan: !!opts.orphan,
      faqCount: opts.faq || 0,
      facts: (opts.subjects || []).map(subject => ({
        subject,
        claim: `${legacyFactValue(client.domain + path, subject)}% of B2B buyers now start research in an AI assistant`,
        value: legacyFactValue(client.domain + path, subject),
        source: 'uncited'
      })),
      ...opts
    };
  };
  return [
    mk('/about', `About ${client.name}`, { thin: true, subjects: [] }),
    mk('/services', `${client.name} — Services`, { schema: true, subjects: [`metric-1`] }),
    // the two legacy blog posts share metric-1 with /services and each other →
    // guaranteed contradiction material for the baseline scan
    mk('/blog/old-industry-overview', `The state of ${client.niche}`, { subjects: ['metric-1', 'metric-2'], faq: 1 }),
    mk('/blog/legacy-tips', `${client.niche}: 7 tips`, { thin: true, jsRendered: true, orphan: true, subjects: ['metric-2'] })
  ];
}

function legacyFactValue(basis, subject) {
  return 40 + (fnv1a(basis + subject) % 45); // 40–84, a different derivation than the writer's
}

// Citability heuristic for existing pages (0–100) — a lightweight cousin of the
// full rubric, appropriate for content we didn't produce.
function scoreExistingPage(page) {
  let score = 0;
  score += page.wordCount >= 1500 ? 25 : page.wordCount >= 800 ? 15 : 5;
  score += page.hasSchema ? 20 : 0;
  score += page.faqCount >= 1 ? 15 : 0;
  score += page.jsRendered ? 0 : 25; // invisibility penalty: JS-rendered content hurts
  score += page.orphan ? 0 : 15;    // orphans break authority flow
  return score;
}

// Per-query per-engine baseline citation ownership: who does this engine cite
// today — the client, a competitor, or nobody (citation whitespace)?
function queryCitationOwner(client, query, engine, runIndex = 0) {
  const h = fnv1a(client.domain + query + engine + (runIndex ? `run${Math.floor(runIndex / 3)}` : 'baseline'));
  const roll = h % 10;
  if (roll < 4) return null; // nobody cited — whitespace, the cheapest win
  if (roll < 8) return `competitor:${(client.competitors[h % client.competitors.length] || 'unknown').replace(/^https?:\/\//, '')}`;
  return 'client';
}

// Contradiction detector v1 — same fact subject, materially different values.
// Works on anything exposing { facts: [{ subject, value, claim }] } plus a label.
function findContradictions(items) {
  const seen = new Map(); // subject → [{ label, value, claim }]
  const out = [];
  for (const it of items) {
    for (const f of it.facts || []) {
      if (!f.subject || typeof f.value !== 'number') continue;
      const prevList = seen.get(f.subject) || [];
      for (const prev of prevList) {
        if (prev.label !== it.label && Math.abs(prev.value - f.value) >= 5) {
          out.push({
            subject: f.subject,
            a: { label: prev.label, claim: prev.claim, value: prev.value },
            b: { label: it.label, claim: f.claim, value: f.value },
            delta: Math.abs(prev.value - f.value),
            severe: Math.abs(prev.value - f.value) >= 15
          });
        }
      }
      prevList.push({ label: it.label, value: f.value, claim: f.claim });
      seen.set(f.subject, prevList);
    }
  }
  return out;
}

// ---- Measure adapters ------------------------------------------------------

// Google Search Console mock — impressions/clicks/position per keyword.
function gscKeywordData(clientId, keyword, runIndex) {
  const h = fnv1a(clientId + keyword);
  const impressions = 200 + (h % 1800) + runIndex * 40;
  const position = Math.max(1, 4 + (h % 38) - Math.min(runIndex, 3));
  return {
    keyword, impressions,
    clicks: Math.round(impressions * (0.02 + (h % 8) / 100)),
    position
  };
}

// GA4 mock.
function ga4Data(clientId, runIndex) {
  const h = fnv1a(clientId + 'ga4' + runIndex);
  return {
    organicSessions: 400 + (h % 2000) + runIndex * 120,
    engagementRate: +(0.45 + (h % 30) / 100).toFixed(2),
    conversions: 5 + (h % 40) + runIndex
  };
}

// Per-article weekly visitors (GA4 page-level mock) — drives the hidden-post
// traffic threshold. Rises run over run so notifications reliably appear.
function articleVisitors(clientId, slug, runIndex) {
  return (fnv1a(clientId + slug + 'visitors') % 5) + runIndex * 2;
}

// AI Citation Simulator mock — per engine, per article. Citations are
// probabilistic (brief §3.1); the mock models weekly volatility. Documented
// deterministic rule: the alphabetically-first published article cycles
// cited↔dropped on Perplexity per run, so drop detection is always observable.
function citationCheck(clientId, slug, engine, runIndex, isFirstSlug) {
  if (engine === 'perplexity' && isFirstSlug) return runIndex % 2 === 1;
  const h = fnv1a(clientId + slug + engine);
  return h % 4 !== 0;
}

// AI bot tracker mock — crawler visits confirm AI engines are indexing.
function botVisits(clientId, runIndex) {
  return ['GPTBot', 'ClaudeBot', 'Google-Extended', 'PerplexityBot'].map(bot => ({
    bot, visits: 3 + (fnv1a(clientId + bot) % 40) + runIndex * 2
  }));
}

// Content-gap discovery mock — GSC queries with impressions but no ranking page.
function impressionGaps(niche, runIndex) {
  const topics = ['pricing questions', 'vs alternatives', 'compliance checklist'];
  const t = topics[runIndex % topics.length];
  return [{
    query: `${niche} ${t}`,
    impressions: 120 + (fnv1a(niche + t) % 500),
    rankingPage: null
  }];
}

// ---- Publish adapters ------------------------------------------------------

function robotsTxt(client) {
  if (client.simulateRobotsBlock) {
    return 'User-agent: GPTBot\nDisallow: /\n\nUser-agent: *\nAllow: /\n';
  }
  return REQUIRED_BOTS
    .map(b => `User-agent: ${b}\nAllow: /`).join('\n\n') + '\n\nSitemap: /sitemap.xml\n';
}

function crawlCheck(client) {
  const txt = robotsTxt(client);
  const blocked = REQUIRED_BOTS.filter(bot =>
    new RegExp(`User-agent: ${bot}\\nDisallow: /`).test(txt) ||
    (/User-agent: \*\nDisallow: \//.test(txt) && !txt.includes(`User-agent: ${bot}\nAllow`)));
  return { ok: blocked.length === 0, blocked, required: REQUIRED_BOTS };
}

// Symmetry gate (July update §1.4): 1:1 parity between the DOM (what renders)
// and the JSON-LD metadata. Any mismatch = ambiguous signal = no publish.
function symmetryCheck(article) {
  const mismatches = [];
  if (article.schemaHeadline !== article.title) {
    mismatches.push(`JSON-LD headline "${article.schemaHeadline}" ≠ H1 "${article.title}"`);
  }
  const opening = (article.directAnswer || '').split(/\s+/).slice(0, 12).join(' ');
  if (opening && article.schemaDescription && !article.schemaDescription.startsWith(opening.split(' ').slice(0, 4).join(' '))) {
    mismatches.push('JSON-LD description does not derive from the opening paragraph');
  }
  return { ok: mismatches.length === 0, mismatches };
}

// WordPress REST API mock — writes into the client's mock site state.
// Posts are created "published but not in navigation" (July update §2.1):
// live URL, discoverable via sitemap + llms.txt, invisible to site visitors
// until the client opts in after the traffic threshold.
function wpUpsertPost(client, article) {
  const url = `/mock-wp/${client.id}/posts/${article.slug}`;
  const post = {
    slug: article.slug,
    title: article.title,
    url,
    inNavigation: article.visibility === 'visible',
    clusterTopic: article.clusterTopic || null,
    isPillar: !!article.isPillar,
    metaTitle: `${article.title} | ${client.name}`,
    metaDescription: article.directAnswer.split(/\s+/).slice(0, 24).join(' ') + '…',
    canonical: url,
    og: { 'og:title': article.title, 'og:type': 'article', 'og:url': url },
    category: client.niche,
    tags: article.targetKeywords,
    featuredImage: `/mock-wp/${client.id}/media/${article.slug}.jpg`,
    schema: buildSchema(client, article),
    body: article.sections,
    faq: article.faq,
    internalLinks: article.internalLinks,
    version: article.version,
    updatedAt: now()
  };
  const i = client.wp.posts.findIndex(p => p.slug === post.slug);
  if (i >= 0) client.wp.posts[i] = post; else client.wp.posts.push(post);
  return post;
}

// Publish-confirmation webhook mock. In production the WordPress plugin calls
// POST /api/plugin/publish-confirmation; here the mock confirms instantly
// unless the demo toggle simulates a dead webhook.
function webhookConfirm(client, article) {
  if (client.simulateWebhookFailure) return { confirmed: false };
  return { confirmed: true, at: now() };
}

// Post-publish verification (July update §2.3): the live URL must return 200
// and carry the full article as static HTML — body, FAQ and JSON-LD present,
// nothing left to client-side rendering.
function verifyPublished(client, article) {
  const post = client.wp.posts.find(p => p.slug === article.slug);
  const checks = {
    status200: !!post,
    staticBody: !!post && post.body.length >= 4 && post.body.every(s => s.content && s.content.length > 100),
    faqPresent: !!post && (article.faq.length === 0 || post.faq.length === article.faq.length),
    schemaEmbedded: !!post && post.schema.length >= 1,
    notJsRendered: true // the mock renderer emits static HTML only
  };
  return { ok: Object.values(checks).every(Boolean), checks };
}

function buildSchema(client, article) {
  const schemas = [{
    '@type': article.schemaType || 'BlogPosting',
    headline: article.schemaHeadline || article.title,
    description: article.schemaDescription || undefined,
    author: { '@type': 'Person', name: `${client.name} Editorial`, url: `/mock-wp/${client.id}/author` },
    datePublished: article.publishedAt || now()
  }];
  if (article.faq.length) {
    schemas.push({
      '@type': 'FAQPage',
      mainEntity: article.faq.map(f => ({
        '@type': 'Question', name: f.q,
        acceptedAnswer: { '@type': 'Answer', text: f.a }
      }))
    });
  }
  return schemas;
}

// llms.txt generator — regenerated after every publish/optimize. July update
// §2.3: each entry lists URL, a one-sentence description AND its topic cluster.
function renderLlmsTxt(client) {
  const lines = [
    `# ${client.name}`, `> ${client.niche}`, '', '## Key pages'
  ];
  for (const p of client.wp.posts) {
    const cluster = p.clusterTopic ? ` [cluster: ${p.clusterTopic}]` : '';
    lines.push(`- [${p.title}](${p.url}): ${p.metaDescription}${cluster}`);
  }
  return lines.join('\n') + '\n';
}

// XML sitemap generator — July update §2.3: articles grouped into topical
// clusters (not a flat list), pillar URL first in its cluster group, with
// lastmod and changefreq. Hidden posts ARE listed — the sitemap is exactly
// how AI crawlers discover them.
function renderSitemap(client) {
  const groups = new Map();
  for (const p of client.wp.posts) {
    const key = p.clusterTopic || 'uncategorised';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  }
  const lines = ['<?xml version="1.0" encoding="UTF-8"?>',
    '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'];
  for (const [topic, posts] of groups) {
    posts.sort((a, b) => (b.isPillar ? 1 : 0) - (a.isPillar ? 1 : 0));
    lines.push(`  <!-- cluster: ${topic} -->`);
    for (const p of posts) {
      lines.push('  <url>',
        `    <loc>${p.url}</loc>`,
        `    <lastmod>${p.updatedAt.slice(0, 10)}</lastmod>`,
        '    <changefreq>weekly</changefreq>',
        '  </url>');
    }
  }
  lines.push('</urlset>');
  return lines.join('\n') + '\n';
}

// IndexNow + GSC ping mocks — recorded, not sent.
function ping(client, service, urls) {
  client.wp.pings.push({ service, urls, ts: now() });
}

// ---- Writer LLM mock -------------------------------------------------------
// Deterministic template "LLM". A real adapter calls the Anthropic API with the
// brief + brand voice; rewrite() maps quality feedback to targeted edits.

const AUTHORITY_SOURCES = ['Harvard Business Review', 'Gartner', 'McKinsey', 'Statista', 'Forrester'];
const FACT_SUBJECT_SPACE = 23;

  const schema = post.schema.map(s =>
    `<script type="application/ld+json">${JSON.stringify({ '@context': 'https://schema.org', ...s })}<\/script>`).join('\n');
  const body = post.body.map(s => `<h2>${__esc(s.heading)}</h2><p>${__esc(s.content)}</p>`).join('\n');
  const faq = post.faq.length
    ? '<h2>FAQ</h2>' + post.faq.map(f => `<h3>${__esc(f.q)}</h3><p>${__esc(f.a)}</p>`).join('\n') : '';
  return `<!doctype html><html><head><title>${__esc(post.metaTitle)}</title>
<meta name="description" content="${__esc(post.metaDescription)}">
<link rel="canonical" href="${__esc(post.canonical)}">
${schema}
<style>body{font-family:Georgia,serif;max-width:720px;margin:2rem auto;padding:0 1rem;color:#222}h1{font-size:1.6rem}</style>
</head><body><p><em>Mock WordPress site for ${__esc(client.name)} — v${post.version} · ${post.inNavigation ? 'in site navigation' : 'hidden post (sitemap-only discovery)'}</em></p>
<h1>${__esc(post.title)}</h1>${body}${links}${faq}</body></html>`;
}

function __route(method, pathname, body) {
  const m = (re) => pathname.match(re);
  let x;
  try {
    if (pathname === '/api/clients' && method === 'GET') return { status: 200, body: __store.clients() };
    if (pathname === '/api/clients' && method === 'POST') return { status: 201, body: __orch.createClient(__store, body) };
    if ((x = m(/^\/api\/clients\/([^/]+)$/)) && method === 'GET') {
      const c = __store.getClient(x[1]);
      return c ? { status: 200, body: c } : { status: 404, body: { error: 'Client not found' } };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/settings$/)) && method === 'PUT') {
      return { status: 200, body: __orch.updateSettings(__store, x[1], body) };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/run\/([^/]+)$/)) && method === 'POST') {
      return { status: 200, body: __orch.runStage(__store, x[1], x[2]) };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/plan\/decision$/)) && method === 'POST') {
      return { status: 200, body: __orch.planDecision(__store, x[1], body.decision, body.note) };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/articles\/([^/]+)\/decision$/)) && method === 'POST') {
      return { status: 200, body: __orch.articleDecision(__store, x[1], x[2], body.decision) };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/articles\/([^/]+)\/visibility$/)) && method === 'POST') {
      return { status: 200, body: __orch.visibilityDecision(__store, x[1], x[2], body.decision, 'operator') };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/reports\/([^/]+)\/decision$/)) && method === 'POST') {
      return { status: 200, body: __orch.reportDecision(__store, x[1], x[2], body.decision) };
    }
    if ((x = m(/^\/api\/clients\/([^/]+)\/escalations\/([^/]+)\/resolve$/)) && method === 'POST') {
      return { status: 200, body: __orch.resolveEscalation(__store, x[1], x[2], body.action) };
    }
    if ((x = m(/^\/mock-wp\/([^/]+)\/llms\.txt$/))) {
      const c = __store.getClient(x[1]);
      return { status: 200, body: (c && c.wp.llmsTxt) || '# (no pages published yet)\n', type: 'text/plain' };
    }
    if ((x = m(/^\/mock-wp\/([^/]+)\/robots\.txt$/))) {
      const c = __store.getClient(x[1]);
      return { status: 200, body: c ? __mock.robotsTxt(c) : 'not found', type: 'text/plain' };
    }
    if ((x = m(/^\/mock-wp\/([^/]+)\/sitemap\.xml$/))) {
      const c = __store.getClient(x[1]);
      return { status: 200, body: c ? __mock.renderSitemap(c) : 'not found', type: 'text/plain' };
    }
    if ((x = m(/^\/mock-wp\/([^/]+)\/posts\/([^/]+)$/))) {
      const c = __store.getClient(x[1]);
      const post = c && c.wp.posts.find(p => p.slug === x[2]);
      return post ? { status: 200, body: __postPage(c, post), type: 'text/html' }
        : { status: 404, body: 'not found', type: 'text/plain' };
    }
    return { status: 404, body: { error: 'Not found (demo router)' } };
  } catch (err) {
    return { status: err.status || 500, body: { error: err.message } };
  }
}

const __realFetch = window.fetch.bind(window);
window.fetch = function (input, init = {}) {
  const url = typeof input === 'string' ? input : input.url;
  const pathname = url.startsWith('/') ? url.split('?')[0] : new URL(url, location.href).pathname;
  if (!pathname.startsWith('/api/') && !pathname.startsWith('/mock-wp/')) return __realFetch(input, init);
  const body = init.body ? JSON.parse(init.body) : {};
  const r = __route((init.method || 'GET').toUpperCase(), pathname, body);
  const isJson = !r.type;
  const text = isJson ? JSON.stringify(r.body) : r.body;
  return Promise.resolve({
    ok: r.status < 400, status: r.status, statusText: '',
    json: async () => (isJson ? r.body : JSON.parse(text)),
    text: async () => text
  });
};

// mock-WP links (llms.txt, robots.txt, posts) open as generated blob pages
document.addEventListener('click', (e) => {
  const a = e.target.closest('a[href^="/mock-wp/"]');
  if (!a) return;
  e.preventDefault();
  const r = __route('GET', a.getAttribute('href'), {});
  const blob = new Blob([r.body], { type: r.type || 'text/plain' });
  window.open(URL.createObjectURL(blob), '_blank');
});

// ---- seed: a populated agency so the first impression is a working system ---

function __seed() {
  if (__store.clients().length) return;
  try {

    __orch.runStage(__store, c1.id, 'optimize');
    __orch.runStage(__store, c1.id, 'research'); // plan v2 consumes the fed-back gap

    const c2 = __orch.createClient(__store, {
      name: 'Nordwind SaaS', domain: 'nordwind.example', niche: 'EV charging software',
      keywords: ['smart EV charging', 'load balancing chargers'],

}

<script>
'use strict';
/* Aureva operator console — vanilla JS, no build step. */

const state = { clients: [], selId: null, tab: 'pipeline', view: 'client' };
const $ = (s) => document.querySelector(s);
const ENGINES = ['chatgpt', 'gemini', 'perplexity', 'google_ai_overview'];
const ENGINE_LABEL = { chatgpt: 'ChatGPT', gemini: 'Gemini', perplexity: 'Perplexity', google_ai_overview: 'Google AI Overview' };

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
function badge(v) { return `<span class="badge b-${esc(v)}" data-testid="badge-${esc(v)}">${esc(String(v).replace(/_/g, ' '))}</span>`; }

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'content-type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || res.statusText);
  return json;
}

function toast(msg, status) {
  const t = $('#toast');
  t.innerHTML = (status ? badge(status) + ' ' : '') + esc(msg);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 6000);
}

function sel() { return state.clients.find(c => c.id === state.selId) || null; }

async function refresh() {
  state.clients = await api('GET', '/api/clients');
  if (!state.selId && state.clients.length) state.selId = state.clients[0].id;
  render();
}

// ---------- actions ----------

async function act(fn, okMsg) {
  closeModal(); // decisions may be taken from inside a modal; never leave a stale overlay up
  try {
    const out = await fn();
    if (out && out.summary) toast(out.summary, out.status);
    else if (okMsg) toast(okMsg);
    await refresh();
  } catch (e) {
    toast(e.message, 'FAIL');
    await refresh();
  }
}

window.runStage = (stage) => act(() => api('POST', `/api/clients/${state.selId}/run/${stage}`));
window.planDecide = (d) => act(() => api('POST', `/api/clients/${state.selId}/plan/decision`, { decision: d }), `Plan ${d}d`);
window.articleDecide = (aid, d) => act(() => api('POST', `/api/clients/${state.selId}/articles/${aid}/decision`, { decision: d }), `Article ${d}`);
window.visibilityDecide = (aid, d) => act(() => api('POST', `/api/clients/${state.selId}/articles/${aid}/visibility`, { decision: d }),
  d === 'make_visible' ? 'Post is now publicly visible (in navigation)' : 'Post kept hidden (sitemap-only)');
window.reportDecide = (rid) => act(() => api('POST', `/api/clients/${state.selId}/reports/${rid}/decision`, { decision: 'approve' }), 'Report approved — optimization unlocked');
window.resolveEsc = (eid, action) => act(() => api('POST', `/api/clients/${state.selId}/escalations/${eid}/resolve`, { action }), `Escalation resolved: ${action}`);
window.selectClient = (id) => { state.selId = id; state.view = 'client'; state.tab = 'pipeline'; render(); };
window.setTab = (t) => { state.tab = t; render(); };
window.showOnboard = () => { state.view = 'onboard'; render(); };
window.closeModal = () => $('#modal-wrap').classList.remove('show');

window.submitOnboard = async (ev) => {
  ev.preventDefault();
  const f = ev.target;
  const split = (v) => v.split(',').map(s => s.trim()).filter(Boolean);
  try {
    const client = await api('POST', '/api/clients', {
      name: f.name.value, domain: f.domain.value, niche: f.niche.value,
      keywords: split(f.keywords.value), competitors: split(f.competitors.value),
      brandVoice: f.brandVoice.value, reviewMode: f.reviewMode.value
    });
    state.selId = client.id; state.view = 'client'; state.tab = 'baseline';
    toast(`Client "${client.name}" onboarded — baseline audit recorded. Plugin API key: ${client.apiKey}`);
    await refresh();
  } catch (e) { toast(e.message, 'FAIL'); }
  return false;
};

window.saveSettings = async (ev) => {
  ev.preventDefault();
  const f = ev.target;
  await act(() => api('PUT', `/api/clients/${state.selId}/settings`, {
    thresholds: {
      qualityMin: +f.qualityMin.value,
      maxWriterAttempts: +f.maxWriterAttempts.value,
      dropSensitivity: +f.dropSensitivity.value,
      visitorThreshold: +f.visitorThreshold.value,
      visitorWindowDays: +f.visitorWindowDays.value
    },
    reviewMode: f.reviewMode.value,
    simulateRobotsBlock: f.simulateRobotsBlock.checked,
    simulateWebhookFailure: f.simulateWebhookFailure.checked
  }), 'Settings saved');
  return false;
};

window.viewArticle = (aid) => {
  const a = sel().articles.find(x => x.id === aid);
  if (!a) return;
  const links = (a.internalLinks || []).map(l => typeof l === 'object' ? l : { target: l, context: '', sameCluster: false });
  const symmetryOk = a.schemaHeadline === a.title;
  $('#modal').innerHTML = `
    <h1>${esc(a.title)}</h1>
    <p class="dim">${badge(a.status)} ${a.publishedUrl ? badge(a.visibility || 'hidden') : ''} score ${a.score ?? '—'} · attempt ${a.attempt} · v${a.version} · ${a.wordCount} words</p>
    <h2>Direct answer (citation snippet)</h2><p>${esc(a.directAnswer)}</p>
    <h2>Score breakdown (Signal Clarity rubric v2)</h2>
    ${a.scoreBreakdown ? `<pre data-testid="score-breakdown">${esc(JSON.stringify(a.scoreBreakdown, null, 2))}</pre>` : '<p class="dim">Not scored yet.</p>'}
    <h2>Symmetry (DOM ↔ JSON-LD)</h2>
    <p class="dim" data-testid="symmetry-state">${symmetryOk
      ? '✓ JSON-LD headline matches the H1.'
      : `⚠ JSON-LD headline "${esc(a.schemaHeadline)}" ≠ H1 "${esc(a.title)}" — the publish symmetry gate will hold this.`}</p>
    <h2>Semantic relationship links (${links.length})</h2>
    ${links.map(l => `<p class="dim" data-testid="semantic-link">→ <span class="mono">${esc(l.target)}</span>${l.sameCluster ? ' <span class="badge b-low">same cluster</span>' : ''}<br>${l.context ? esc(l.context) : '<em>⚠ no conceptual bridge — bare link</em>'}</p>`).join('')}
    <h2>Structure</h2>
    <p class="dim">Headings: ${a.sections.map(s => esc(s.heading)).join(' · ')}</p>
    <p class="dim">Entities (${a.entities.length}): ${a.entities.map(esc).join(', ')}</p>
    <p class="dim">Facts (${a.facts.length}): e.g. “${esc(a.facts[0].claim)}” — ${esc(a.facts[0].source)}, ${a.facts[0].year}</p>
    <p class="dim">FAQ: ${a.faq.length} questions · Schema: ${a.faq.length ? '' : '(no FAQPage) '}${a.schemaTypes.map(esc).join(', ')}</p>
    <p class="dim">Unique Information Delta: ${esc(a.angle)}</p>
    ${a.contradictions && (a.contradictions.severe.length + a.contradictions.advisory.length) ? `
      <h2>Contradiction check</h2>
      ${a.contradictions.severe.map(c => `<p data-testid="contradiction-severe">⛔ ${esc(c.subject)}: ${c.a.value}% (${esc(c.a.label)}) vs ${c.b.value}% (${esc(c.b.label)})</p>`).join('')}
      ${a.contradictions.advisory.map(c => `<p class="dim">△ minor variance on ${esc(c.subject)}: ${c.a.value}% vs ${c.b.value}%</p>`).join('')}` : ''}
    ${a.publishedUrl ? `
      <h2>Publication</h2>
      <p class="dim" data-testid="pub-state">Webhook: ${esc(a.webhookStatus || '—')} · Verification: ${a.verification ? (a.verification.ok ? '✓ 200 + static HTML confirmed' : '⚠ failed: ' + Object.entries(a.verification.checks).filter(([, v]) => !v).map(([k]) => k).join(', ')) : '—'} · Visibility: ${esc(a.visibility)}</p>
      <p><a href="${esc(a.publishedUrl)}" target="_blank" style="color:var(--accent2)">View live page →</a></p>` : ''}
    <p style="margin-top:14px"><button onclick="closeModal()" data-testid="modal-close">Close</button></p>`;
  $('#modal-wrap').classList.add('show');
};

function ownerCell(v) {
  if (v === null) return '<td class="cite-nobody" data-testid="cite-nobody">◌ nobody</td>';
  if (v === 'client') return '<td class="cite-yes">● client</td>';
  return `<td class="cite-no">${esc(v.replace('competitor:', ''))}</td>`;
}

window.viewReport = (rid) => {
  const r = sel().reports.find(x => x.id === rid);
  if (!r) return;
  $('#modal').innerHTML = `
    <h1>Performance report #${r.week}</h1>
    <p class="dim">${badge(r.status)} · ${esc(r.createdAt)}</p>
    <h2>Keywords (Search Console)</h2>
    <table><tr><th>Keyword</th><th>Impressions</th><th>Clicks</th><th>Position</th></tr>
    ${r.keywords.slice(0, 8).map(k => `<tr><td>${esc(k.keyword)}</td><td>${k.impressions}</td><td>${k.clicks}</td><td>${k.position}</td></tr>`).join('')}
    </table>
    <h2>Citations per engine (our articles)</h2>
    <table data-testid="citation-matrix"><tr><th>Article</th>${ENGINES.map(e => `<th>${ENGINE_LABEL[e]}</th>`).join('')}</tr>
    ${r.citations.map(row => `<tr><td>${esc(row.slug)}</td>${ENGINES.map(e =>
      `<td class="${row.engines[e] ? 'cite-yes' : 'cite-no'}">${row.engines[e] ? '● cited' : '○ not cited'}</td>`).join('')}</tr>`).join('')}
    </table>
    <h2>Query ownership — who does each engine cite? (◌ nobody = whitespace)</h2>
    <table data-testid="query-ownership"><tr><th>Query</th>${ENGINES.map(e => `<th>${ENGINE_LABEL[e]}</th>`).join('')}</tr>
    ${(r.queryCitations || []).slice(0, 8).map(row => `<tr><td>${esc(row.query)}</td>${ENGINES.map(e => ownerCell(row.engines[e])).join('')}</tr>`).join('')}
    </table>

    ${(r.whitespace || []).length ? (r.whitespace || []).map(w => `<p data-testid="whitespace-query">◌ “${esc(w.query)}” — 2+ engines cite nobody</p>`).join('') : '<p class="dim">None this week.</p>'}
    <h2>Hidden-post traffic (threshold ${sel().thresholds.visitorThreshold} visitors / ${sel().thresholds.visitorWindowDays} days)</h2>
    <table data-testid="visitors-table"><tr><th>Article</th><th>Visitors</th></tr>
    ${(r.visitors || []).map(v => `<tr><td>${esc(v.slug)}</td><td>${v.visitors}</td></tr>`).join('')}
    </table>
    <h2>Traffic (GA4)</h2>
    <p class="dim">Organic sessions: ${r.ga4.organicSessions} · Engagement: ${r.ga4.engagementRate} · Conversions: ${r.ga4.conversions}</p>
    <h2>AI bot crawls</h2>
    <p class="dim">${r.botVisits.map(b => `${esc(b.bot)}: ${b.visits}`).join(' · ')}</p>
    <h2>Dropped pages (${r.droppedPages.length})</h2>
    ${r.droppedPages.length ? r.droppedPages.map(d => `<p data-testid="dropped-page">⚠ ${esc(d.slug)} — ${esc(d.reason)}</p>`).join('') : '<p class="dim">None.</p>'}
    <h2>New content gaps (${r.newGaps.length})</h2>
    ${r.newGaps.map(g => `<p class="dim">“${esc(g.query)}” — ${g.impressions} impressions, no ranking page</p>`).join('')}
    ${r.status === 'pending_review' ? `<p style="margin-top:12px"><button class="primary" data-testid="report-approve" onclick="reportDecide('${r.id}')">Approve report</button></p>` : ''}
    <p style="margin-top:14px"><button onclick="closeModal()" data-testid="modal-close">Close</button></p>`;
  $('#modal-wrap').classList.add('show');
};

// ---------- rendering ----------

function render() {
  $('#client-list').innerHTML = state.clients.map(c =>
    `<a href="#" class="${c.id === state.selId && state.view === 'client' ? 'sel' : ''}" data-testid="client-link-${esc(c.name)}"
       onclick="selectClient('${c.id}');return false">${esc(c.name)}<small>${esc(c.domain)}</small></a>`).join('')
    || '<p class="dim" style="padding:8px">No clients yet.</p>';

  if (state.view === 'onboard' || !state.clients.length) return renderOnboard();
  const c = sel();
  if (!c) return;

  const tabs = ['pipeline', 'baseline', 'plan', 'content', 'publishing', 'monitoring', 'escalations', 'audit', 'settings'];
  const openEsc = c.escalations.filter(e => e.status === 'open').length;
  const pendingNotif = c.notifications ? c.notifications.filter(n => n.status === 'pending').length : 0;
  const label = {
    escalations: `escalations${openEsc ? ` (${openEsc})` : ''}`,

  };
  $('#content').innerHTML = `

function renderOnboard() {
  $('#content').innerHTML = `
    <h1>Onboard a new client</h1>
    <p class="dim">Step 1 of the pipeline — a baseline audit of the existing site runs automatically, then everything downstream runs from this brief.</p>

      <label>Seed keywords (comma-separated)</label><input name="keywords" data-testid="ob-keywords" required>
      <label>Competitor URLs (comma-separated)</label><input name="competitors" data-testid="ob-competitors" required>
      <label>Brand voice</label><input name="brandVoice" data-testid="ob-voice" placeholder="authoritative but plain-spoken">
      <label>Content approval mode</label>
      <select name="reviewMode" data-testid="ob-reviewmode">
        <option value="auto">Auto-publish after quality gate</option>
        <option value="client_review">Client reviews drafts before publishing</option>
      </select>
      <p style="margin-top:14px"><button class="primary" type="submit" data-testid="ob-submit">Onboard client</button></p>
    </form>`;
}

function renderTab(c) {
  return {
    pipeline: renderPipeline, baseline: renderBaseline, plan: renderPlan, content: renderContent,
    publishing: renderPublishing, monitoring: renderMonitoring,
    escalations: renderEscalations, audit: renderAudit, settings: renderSettings
  }[state.tab](c);
}

function count(c, status) { return c.articles.filter(a => a.status === status).length; }

function renderPipeline(c) {
  const last = (agent) => {
    const e = [...c.audit].reverse().find(x => x.agent === agent);
    return e ? `${badge(e.status)}<p>${esc(e.summary)}</p>` : '<p class="dim">Not run yet.</p><p></p>';
  };
  const stages = [
    ['baseline', '0 · Baseline', 'Pre-engagement audit: existing pages, citations, whitespace, robots'],
    ['research', '1 · Research', 'Keyword discovery, topical map, content gaps → monthly plan'],
    ['brief', '2 · Brief', 'Per-article briefs: keywords, headings, links, schema, angle'],
    ['writer', '3 · Writer', 'Signal-Clarity drafts with semantic relationship links'],
    ['quality', '4 · Quality', `Rubric v2 vs threshold ${c.thresholds.qualityMin}; retry loop; contradiction gate`],
    ['publish', '5 · Publish', 'Crawl check, symmetry gate, hidden WP post, sitemap + llms.txt, pings'],
    ['monitor', '6 · Monitor', 'Weekly citations, whitespace, drops, traffic thresholds, new gaps'],
    ['optimize', '7 · Optimize', 'Fix flagged pages, republish, feed gaps + whitespace to Research']
  ];
  return `
    <div class="row" style="margin-bottom:14px">
      <button class="primary" data-testid="run-full" onclick="runStage('full')">▶ Run full pipeline</button>
      <span class="dim">Runs Research → Publish, halting at human gates; symmetry holds trigger one bounded second pass.</span>
    </div>
    <div class="cards">
      ${stages.map(([id, name, desc]) => `
        <div class="card" data-testid="stage-${id}">
          <h3>${name}</h3>
          <p>${desc}</p>
          <div data-testid="stage-${id}-last">${last(id)}</div>
          <button data-testid="run-${id}" onclick="runStage('${id}')" style="margin-top:8px">Run</button>
        </div>`).join('')}
    </div>
    <h2>State</h2>
    <p class="dim" data-testid="state-summary">
      Plan: ${c.plan ? `v${c.plan.version} ${c.plan.status}` : 'none'} ·
      Briefs: ${c.briefs.length} ·
      Drafts: ${count(c, 'draft')} · Pending client review: ${count(c, 'pending_client_review')} ·
      Approved: ${count(c, 'approved')} · Published: ${count(c, 'published')} ·
      Hidden: ${c.articles.filter(a => a.publishedUrl && a.visibility === 'hidden').length} ·
      Visible: ${c.articles.filter(a => a.publishedUrl && a.visibility === 'visible').length} ·
      Flagged: ${count(c, 'flagged')} · Escalated: ${count(c, 'escalated')} ·
      Open escalations: ${c.escalations.filter(e => e.status === 'open').length} ·
      Pending visibility decisions: ${c.notifications ? c.notifications.filter(n => n.status === 'pending').length : 0} ·
      Gaps queued: ${c.pendingGaps.length}
    </p>`;
}

function renderBaseline(c) {
  const b = c.baseline;
  if (!b) return '<div class="empty" data-testid="baseline-empty">No baseline audit yet — run stage 0.</div>';
  const s = b.summary;
  return `
    <div class="row">
      <h2 style="margin:0">Baseline audit — the “before” picture</h2>
      <span class="dim">${esc(b.createdAt.slice(0, 10))}</span>
      <button data-testid="rerun-baseline" onclick="runStage('baseline')">Re-run</button>
    </div>
    <p class="dim" data-testid="baseline-summary">Avg citability ${s.avgCitability}/100 · ${s.jsRenderedPages} JS-rendered · ${s.orphanPages} orphaned ·
      ${s.pagesWithoutSchema} without schema · ${s.contradictionsFound} contradictions · ${s.whitespaceQueries} whitespace queries ·
      robots.txt ${b.robots.ok ? '✓ all AI crawlers allowed' : '⚠ BLOCKS ' + b.robots.blocked.join(', ')}</p>
    <h2>Existing pages</h2>
    <table data-testid="baseline-pages">
      <tr><th>Page</th><th>Citability</th><th>Words</th><th>Schema</th><th>Flags</th></tr>
      ${b.pages.map(p => `<tr>
        <td>${esc(p.title)}<br><span class="dim mono">${esc(p.url)}</span></td>
        <td>${p.citability}/100</td><td>${p.wordCount}</td>
        <td>${p.hasSchema ? '✓' : '—'}</td>
        <td class="dim">${[p.jsRendered ? '⚠ JS-rendered' : '', p.orphan ? '⚠ orphan' : ''].filter(Boolean).join(' · ') || '—'}</td>
      </tr>`).join('')}
    </table>
    <h2>Contradictions in existing content (${b.contradictions.length})</h2>
    ${b.contradictions.length ? b.contradictions.map(x => `
      <p data-testid="baseline-contradiction">⛔ <span class="mono">${esc(x.subject)}</span>: ${x.a.value}% on ${esc(x.a.label)} vs ${x.b.value}% on ${esc(x.b.label)} ${x.severe ? badge('high') : badge('medium')}</p>`).join('')
      : '<p class="dim">None found.</p>'}
    <h2>Query baseline — who is cited today? (◌ nobody = whitespace)</h2>
    <table data-testid="baseline-queries"><tr><th>Query</th>${ENGINES.map(e => `<th>${ENGINE_LABEL[e]}</th>`).join('')}</tr>
    ${b.queries.map(row => `<tr><td>${esc(row.query)}</td>${ENGINES.map(e => ownerCell(row.engines[e])).join('')}</tr>`).join('')}
    </table>
    ${b.whitespace.length ? `<p class="dim" data-testid="baseline-whitespace">Whitespace queries (nobody cited on 2+ engines): ${b.whitespace.map(esc).join(' · ')}</p>` : ''}`;
}

function renderPlan(c) {
  if (!c.plan) return '<div class="empty" data-testid="plan-empty">No content plan yet — run the Research agent.</div>';
  const p = c.plan;
  return `
    <div class="row">
      <h2 style="margin:0">Content plan v${p.version}</h2>
      ${badge(p.status)}
      ${p.status === 'pending_approval' ? `
        <button class="primary" data-testid="plan-approve" onclick="planDecide('approve')">Approve plan</button>
        <button class="danger" data-testid="plan-reject" onclick="planDecide('reject')">Reject</button>` : ''}
    </div>
    <p class="dim">${p.keywords.length} keywords · ${p.clusters.length} clusters · ${p.gapKeywordsConsumed} gap keywords fed back from Monitor</p>
    ${(p.contradictions || []).length ? `
      <h2>Corpus contradictions flagged (${p.contradictions.length})</h2>
      ${p.contradictions.slice(0, 5).map(x => `<p class="dim" data-testid="plan-contradiction">⛔ ${esc(x.subject)}: ${x.a.value}% (${esc(x.a.label)}) vs ${x.b.value}% (${esc(x.b.label)}) — update or remove one</p>`).join('')}` : ''}
    <h2>Prioritized articles (long-tail first)</h2>
    <table data-testid="plan-table">
      <tr><th>#</th><th>Keyword</th><th>Competition</th><th>Volume</th><th>Intent</th><th>Source</th></tr>
      ${p.prioritizedArticles.map((k, i) =>
        `<tr><td>${i + 1}</td><td>${esc(k.keyword)}</td><td>${badge(k.competition)}</td><td>${k.volume}</td><td>${esc(k.intent)}</td><td>${k.source === 'citation_whitespace' ? '<span class="badge b-low">◌ whitespace</span>' : esc(k.source)}</td></tr>`).join('')}
    </table>
    <h2>Topical map (hub &amp; spoke)</h2>
    ${p.clusters.map(cl => `
      <div class="card" style="margin-bottom:8px">
        <h3>Pillar: ${esc(cl.pillar)}</h3>
        <p class="dim">Spokes: ${cl.spokes.map(esc).join(' · ') || '—'}</p>
      </div>`).join('')}`;
}

function renderContent(c) {
  if (!c.articles.length && !c.briefs.length) return '<div class="empty">No briefs or drafts yet — approve a plan, then run Brief and Writer.</div>';
  return `
    <p class="dim">${c.briefs.length} briefs · ${c.articles.length} articles</p>
    <table data-testid="articles-table">
      <tr><th>Article</th><th>Keyword</th><th>Status</th><th>Visibility</th><th>Score</th><th>Attempt</th><th>v</th><th></th></tr>
      ${c.articles.map(a => `
        <tr data-testid="article-row-${esc(a.slug)}">
          <td>${esc(a.title)}</td>
          <td class="dim">${esc(a.keyword)}</td>
          <td>${badge(a.status)}${a.feedback && (a.feedback.failed || []).includes('symmetryGate') ? ' <span class="dim">⚠ symmetry</span>' : ''}</td>
          <td>${a.publishedUrl ? badge(a.visibility || 'hidden') : '<span class="dim">—</span>'}</td>
          <td>${a.score ?? '—'}</td>
          <td>${a.attempt}</td>
          <td>${a.version}</td>
          <td class="row">
            <button data-testid="article-view-${esc(a.slug)}" onclick="viewArticle('${a.id}')">View</button>
            ${a.status === 'pending_client_review' ? `
              <button class="primary" data-testid="article-approve-${esc(a.slug)}" onclick="articleDecide('${a.id}','approve')">Approve</button>
              <button data-testid="article-revision-${esc(a.slug)}" onclick="articleDecide('${a.id}','revision')">Revise</button>
              <button class="danger" data-testid="article-reject-${esc(a.slug)}" onclick="articleDecide('${a.id}','reject')">Reject</button>` : ''}
          </td>
        </tr>`).join('')}
    </table>`;
}

function renderPublishing(c) {
  const pending = (c.notifications || []).filter(n => n.status === 'pending');
  const decided = (c.notifications || []).filter(n => n.status !== 'pending');
  if (!c.wp.posts.length) return '<div class="empty" data-testid="publishing-empty">Nothing published yet.</div>';
  return `
    <p>
      <a href="/mock-wp/${c.id}/sitemap.xml" target="_blank" data-testid="link-sitemap" style="color:var(--accent2)">sitemap.xml</a> ·
      <a href="/mock-wp/${c.id}/llms.txt" target="_blank" data-testid="link-llms" style="color:var(--accent2)">llms.txt</a> ·
      <a href="/mock-wp/${c.id}/robots.txt" target="_blank" data-testid="link-robots" style="color:var(--accent2)">robots.txt</a>
    </p>
    ${pending.length ? `
      <h2>Traffic-threshold notifications — client decision needed (${pending.length})</h2>
      ${pending.map(n => `
        <div class="card" style="margin-bottom:8px" data-testid="notification-${esc(n.slug)}">
          <h3>“${esc(n.title)}”</h3>
          <p>${n.visitors} visitors in ${n.windowDays} days — above the threshold. Make it publicly visible?</p>
          <div class="row">
            <button class="primary" data-testid="notif-visible-${esc(n.slug)}" onclick="visibilityDecide('${n.articleId}','make_visible')">Make visible</button>
            <button data-testid="notif-hidden-${esc(n.slug)}" onclick="visibilityDecide('${n.articleId}','keep_hidden')">Keep hidden</button>
          </div>
        </div>`).join('')}` : ''}
    <table data-testid="posts-table">
      <tr><th>Post</th><th>Cluster</th><th>Visibility</th><th>Webhook</th><th>Schema</th><th>v</th><th></th></tr>
      ${c.wp.posts.map(p => {
        const art = c.articles.find(a => a.slug === p.slug) || {};
        return `
        <tr><td>${esc(p.title)}${p.isPillar ? ' <span class="badge b-low">pillar</span>' : ''}</td>
        <td class="dim">${esc(p.clusterTopic || '—')}</td>
        <td data-testid="post-vis-${esc(p.slug)}">${p.inNavigation ? badge('visible') : badge('hidden')}</td>
        <td class="dim">${esc(art.webhookStatus || '—')}</td>
        <td class="dim">${p.schema.map(s => esc(s['@type'])).join(', ')}</td><td>${p.version}</td>
        <td><a href="${esc(p.url)}" target="_blank" data-testid="post-link-${esc(p.slug)}" style="color:var(--accent2)">Open →</a></td></tr>`;
      }).join('')}
    </table>
    ${decided.length ? `<p class="dim">Past visibility decisions: ${decided.map(n => `${esc(n.slug)} → ${esc(n.decision)}`).join(' · ')}</p>` : ''}
    <h2>Indexing pings</h2>
    <table data-testid="pings-table">
      <tr><th>Service</th><th>URLs</th><th>When</th></tr>
      ${c.wp.pings.map(p => `<tr><td>${esc(p.service)}</td><td class="dim">${p.urls.length}</td><td class="dim">${esc(p.ts)}</td></tr>`).join('')}
    </table>`;
}

function renderMonitoring(c) {
  return `
    <div class="row" style="margin-bottom:10px">
      <button class="primary" data-testid="run-monitor-tab" onclick="runStage('monitor')">Run weekly monitor</button>
      <button data-testid="run-optimize-tab" onclick="runStage('optimize')">Run optimizer</button>
    </div>
    ${!c.reports.length ? '<div class="empty" data-testid="reports-empty">No reports yet.</div>' : `
    <table data-testid="reports-table">
      <tr><th>Report</th><th>Status</th><th>Citations</th><th>Whitespace</th><th>Dropped</th><th>Gaps</th><th></th></tr>
      ${[...c.reports].reverse().map(r => {
        const cited = r.citations.reduce((s, row) => s + Object.values(row.engines).filter(Boolean).length, 0);
        return `<tr data-testid="report-row-${r.week}">
          <td>#${r.week} <span class="dim">${esc(r.createdAt.slice(0, 10))}</span></td>
          <td>${badge(r.status)}</td>
          <td>${cited}/${r.citations.length * 4}</td>
          <td>${(r.whitespace || []).length}</td>
          <td>${r.droppedPages.length}</td>
          <td>${r.newGaps.length}</td>
          <td class="row">
            <button data-testid="report-view-${r.week}" onclick="viewReport('${r.id}')">View</button>
            ${r.status === 'pending_review' ? `<button class="primary" data-testid="report-approve-${r.week}" onclick="reportDecide('${r.id}')">Approve</button>` : ''}
          </td></tr>`;
      }).join('')}
    </table>`}
    ${c.optimizationLog.length ? `
      <h2>Optimization log</h2>
      ${c.optimizationLog.map(l => `<div class="card" style="margin-bottom:8px" data-testid="opt-log">
        <p class="dim">${esc(l.ts)} — ${l.pages.length} pages updated, ${l.gapsFedBack} gaps + whitespace queries fed back to Research</p>
        ${l.pages.map(pg => `<p class="dim">↻ ${esc(pg.slug)} → v${pg.version}: ${pg.actions.map(esc).join(', ')}</p>`).join('')}
      </div>`).join('')}` : ''}`;
}

function renderEscalations(c) {
  const items = [...c.escalations].reverse();
  if (!items.length) return '<div class="empty" data-testid="escalations-empty">No escalations. Good.</div>';
  return `
    <table data-testid="escalations-table">
      <tr><th>When</th><th>Source</th><th>Reason</th><th>Status</th><th></th></tr>
      ${items.map(e => `
        <tr data-testid="escalation-row-${e.id}">
          <td class="dim">${esc(e.createdAt.slice(0, 19).replace('T', ' '))}</td>
          <td>${esc(e.source)}</td>
          <td>${esc(e.reason)}</td>
          <td>${badge(e.status)}${e.resolution ? ` <span class="dim">${esc(e.resolution)}</span>` : ''}</td>
          <td class="row">${e.status === 'open' ? `
            ${e.articleId ? `
              <button class="primary" data-testid="esc-approve-${e.id}" onclick="resolveEsc('${e.id}','force_approve')">Force approve</button>
              <button data-testid="esc-rewrite-${e.id}" onclick="resolveEsc('${e.id}','rewrite')">Rewrite</button>` : ''}
            <button class="danger" data-testid="esc-dismiss-${e.id}" onclick="resolveEsc('${e.id}','dismiss')">Dismiss</button>` : ''}
          </td>
        </tr>`).join('')}
    </table>`;
}

function renderAudit(c) {
  return `
    <table data-testid="audit-table">
      <tr><th>When</th><th>Agent</th><th>Status</th><th>Summary</th></tr>
      ${[...c.audit].reverse().map(e => `
        <tr><td class="dim mono">${esc(e.ts.slice(0, 19).replace('T', ' '))}</td>
        <td>${esc(e.agent)}</td><td>${badge(e.status)}</td><td>${esc(e.summary)}</td></tr>`).join('')}
    </table>`;
}

function renderSettings(c) {
  return `
    <form class="panel" onsubmit="return saveSettings(event)">
      <h2 style="margin-top:0">Thresholds</h2>
      <label>Quality minimum Signal Clarity score (0–100)</label>
      <input type="number" name="qualityMin" data-testid="set-qualitymin" value="${c.thresholds.qualityMin}" min="0" max="101">
      <label>Max writer attempts before escalation</label>
      <input type="number" name="maxWriterAttempts" data-testid="set-maxattempts" value="${c.thresholds.maxWriterAttempts}" min="1" max="10">
      <label>Ranking drop sensitivity (positions)</label>
      <input type="number" name="dropSensitivity" data-testid="set-dropsensitivity" value="${c.thresholds.dropSensitivity}" min="1" max="50">
      <label>Visitor threshold for visibility notification</label>
      <input type="number" name="visitorThreshold" data-testid="set-visitorthreshold" value="${c.thresholds.visitorThreshold}" min="1" max="1000">
      <label>Visitor window (days)</label>
      <input type="number" name="visitorWindowDays" data-testid="set-visitorwindow" value="${c.thresholds.visitorWindowDays}" min="1" max="90">
      <h2>Approval gates</h2>
      <label>Content approval mode</label>
      <select name="reviewMode" data-testid="set-reviewmode">
        <option value="auto" ${c.reviewMode === 'auto' ? 'selected' : ''}>Auto-publish after quality gate</option>
        <option value="client_review" ${c.reviewMode === 'client_review' ? 'selected' : ''}>Client reviews drafts before publishing</option>
      </select>
      <div class="check">
        <input type="checkbox" id="robots" name="simulateRobotsBlock" data-testid="set-robotsblock" ${c.simulateRobotsBlock ? 'checked' : ''}>
        <label for="robots" style="margin:0">Simulate robots.txt blocking AI crawlers (demo)</label>
      </div>
      <div class="check">
        <input type="checkbox" id="webhookfail" name="simulateWebhookFailure" data-testid="set-webhookfail" ${c.simulateWebhookFailure ? 'checked' : ''}>
        <label for="webhookfail" style="margin:0">Simulate missing publish-confirmation webhook (demo)</label>
      </div>
      <h2>Plugin API</h2>
      <p class="dim">API key for the WordPress plugin: <span class="mono" data-testid="api-key">${esc(c.apiKey)}</span></p>
      <p class="dim mono">GET /api/plugin/published · GET /api/plugin/performance · GET /api/plugin/notifications · POST /api/plugin/settings · POST /api/plugin/content-decision · POST /api/plugin/visibility-decision · POST /api/plugin/publish-confirmation</p>
      <p style="margin-top:14px"><button class="primary" type="submit" data-testid="set-save">Save settings</button></p>
    </form>`;
}

refresh();

</script>
<script>
/* Guided tour for the interactive demo. Spotlights console elements with
 * coach-mark bubbles. Auto-starts on first visit (localStorage flag),
 * replayable via the banner button. Inlined into demo.html by build-demo.js. */
(function () {
  const DONE_KEY = 'aureva-tour-done';

  const style = document.createElement('style');
  style.textContent = `
#tour .tour-blocker { position: fixed; inset: 0; z-index: 60; }
#tour .tour-hole { position: fixed; z-index: 61; border-radius: 10px; pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(5,8,12,.74); border: 1.5px solid var(--accent);
  transition: all .25s ease; animation: tourpulse 1.6s ease-in-out infinite; }
@keyframes tourpulse { 50% { border-color: rgba(212,162,76,.35); } }
#tour .tour-bubble { position: fixed; z-index: 62; background: var(--panel);
  border: 1px solid var(--accent); border-radius: 12px; padding: 16px 18px;
  box-shadow: 0 12px 44px rgba(0,0,0,.65); transition: top .25s ease, left .25s ease; }
#tour .tour-title { font-weight: 700; color: var(--accent); margin-bottom: 6px; font-size: 14px; }
#tour .tour-text { font-size: 13px; color: var(--text); line-height: 1.55; }
#tour .tour-text b { color: var(--accent2); }
#tour .tour-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 8px; }
#tour .tour-progress { color: var(--dim); font-size: 12px; white-space: nowrap; }
#tour .tour-btns { display: flex; gap: 6px; }
#tour button { padding: 5px 12px; font-size: 12px; }`;
  document.head.appendChild(style);

  const steps = [
    {
      title: 'Welcome to the Aureva pipeline console',
      text: 'Seven agents take a client from onboarding to AI citations — Research, Brief, Writer, Quality, Publish, Monitor, Optimize. Everything here is <b>really running in your browser</b>: real agents, real gates, real scoring, with mock external APIs. Click anywhere (or Next) to take the 60-second tour.'
    },
    {
      sel: '[data-testid="client-list"]',
      title: 'Two demo clients are pre-loaded',
      text: '<b>Meridian Legal</b> has been through the whole loop: 12 articles live, a citation drop detected and auto-optimized. <b>Nordwind SaaS</b> is mid-flow with drafts waiting for client review. Switch anytime — every client has fully separate state.'
    },
    {
      sel: '[data-testid="run-full"]',
      pre: () => { window.setTab('pipeline'); },
      title: 'One click runs the whole pipeline',
      text: 'Research → Brief → Writer → Quality → Publish, in sequence. It <b>halts at every human gate</b> — a specialist must approve the content plan, and (optionally) the client must approve drafts — then resumes where it left off.'
    },
    {
      sel: '[data-testid="stage-research"]',
      title: '…or run any agent on its own',
      text: 'Each of the 7 cards is one agent, independently triggerable. Under each you see its last result with a status: <b>PASS</b>, <b>NEEDS REVIEW</b>, <b>FAIL</b> or <b>ESCALATE TO HUMAN</b> — the same statuses the agents pass to each other.'
    },
    {
      sel: '#tab-body',
      pre: () => { window.setTab('plan'); },
      title: 'The plan gate',
      text: 'Research produced this keyword plan — <b>long-tail, low-competition first</b>, grouped into hub-and-spoke clusters. Nothing gets written until a specialist clicks Approve. This one is a <b>v2 plan</b>: it already contains a content gap fed back by the Monitor agent.'
    },
    {
      sel: '#tab-body',
      pre: () => { window.setTab('content'); },
      title: 'Every article is scored before it can go live',
      text: 'The Quality agent scores drafts 0–100 on GEO criteria (direct answer, entities, facts, FAQ, schema…). Below threshold → <b>sent back to the Writer</b>, rewritten, rescored. Note the <b>attempt column</b>: some drafts needed a retry. Click <b>View</b> on any article for the full score breakdown.'
    },
    {
      sel: '#tab-body',
      pre: () => { window.setTab('publishing'); },
      title: 'Published, indexed, AI-discoverable',
      text: 'Each post goes live with metadata, canonical and JSON-LD schema — open one via its link. After every publish the <b>llms.txt</b> discovery file is regenerated and <b>IndexNow + Search Console</b> are pinged. Publishing refuses to run if robots.txt blocks AI crawlers.'
    },
    {
      sel: '#tab-body',
      pre: () => { window.setTab('monitoring'); },
      title: 'The watchtower — and the loop',
      text: 'Weekly reports track rankings, traffic and <b>citation status per AI engine</b> (ChatGPT, Gemini, Perplexity, Google AI Overview). A dropped citation flags the page; the <b>Optimizer</b> rewrites, extends the FAQ, republishes — and feeds new gaps back to Research. The pipeline never stops.'
    },
    {
      sel: '[data-testid="tab-escalations"]',
      title: 'When agents need a human',
      text: 'Anything the machine can’t resolve — quality failures after max retries, blocked crawlers — lands in the <b>escalation queue</b> for one-click resolution. Combined with the per-client <b>audit log</b> (next tab), every decision is traceable.'
    },
    {
      sel: '#tab-body',
      pre: () => { window.setTab('settings'); },
      title: 'Tune the machine per client',
      text: 'Quality threshold, retry limit, drop sensitivity, auto-publish vs client review — all configurable. Try setting the quality minimum to <b>101</b> and running the pipeline to watch escalations happen. This is also where the <b>WordPress plugin API key</b> lives.'
    },
    {
      title: 'Your turn',
      text: 'Onboard your own client, approve plans, reject drafts, break things. <b>Reset demo data</b> in the top banner restores this seeded state, and <b>Show tour</b> replays this walkthrough. Enjoy.',
      pre: () => { window.setTab('pipeline'); }
    }
  ];

  let i = 0, root = null;

  function build() {
    root = document.createElement('div');
    root.id = 'tour';
    root.innerHTML = `
      <div class="tour-blocker"></div>
      <div class="tour-hole"></div>
      <div class="tour-bubble" data-testid="tour-bubble">
        <div class="tour-title"></div>
        <div class="tour-text"></div>
        <div class="tour-foot">
          <span class="tour-progress" data-testid="tour-progress"></span>
          <span class="tour-btns">
            <button class="tour-back" data-testid="tour-back">Back</button>
            <button class="tour-skip" data-testid="tour-skip">Skip</button>
            <button class="tour-next primary" data-testid="tour-next">Next</button>
          </span>
        </div>
      </div>`;
    document.body.appendChild(root);
    root.querySelector('.tour-back').onclick = (e) => { e.stopPropagation(); i = Math.max(0, i - 1); show(); };
    root.querySelector('.tour-next').onclick = (e) => { e.stopPropagation(); next(); };
    root.querySelector('.tour-skip').onclick = (e) => { e.stopPropagation(); end(); };
    root.querySelector('.tour-blocker').onclick = next;
    window.addEventListener('resize', () => { if (root.style.display !== 'none') position(); });
  }

  function start() { if (!root) build(); i = 0; root.style.display = 'block'; show(); }
  function next() { if (i >= steps.length - 1) return end(); i++; show(); }
  function end() { localStorage.setItem(DONE_KEY, '1'); if (root) root.style.display = 'none'; }

  function show() {
    const s = steps[i];
    if (s.pre) { try { s.pre(); } catch (e) { /* view not available; bubble centers */ } }
    root.querySelector('.tour-title').textContent = s.title;
    root.querySelector('.tour-text').innerHTML = s.text;
    root.querySelector('.tour-progress').textContent = `${i + 1} / ${steps.length}`;
    root.querySelector('.tour-back').style.visibility = i ? 'visible' : 'hidden';
    root.querySelector('.tour-next').textContent = i === steps.length - 1 ? 'Finish' : 'Next';
    setTimeout(position, 90); // let the tab render before measuring
  }

  function position() {
    const s = steps[i];
    const t = s.sel ? document.querySelector(s.sel) : null;
    const hole = root.querySelector('.tour-hole');
    const b = root.querySelector('.tour-bubble');
    b.style.width = Math.min(360, innerWidth - 24) + 'px';
    if (!t) {
      hole.style.display = 'none';
      b.style.top = '50%'; b.style.left = '50%'; b.style.transform = 'translate(-50%,-50%)';
      return;
    }
    t.scrollIntoView({ block: 'center' });
    const r = t.getBoundingClientRect();
    const pad = 6;
    hole.style.display = 'block';
    hole.style.top = (r.top - pad) + 'px';
    hole.style.left = (r.left - pad) + 'px';
    hole.style.width = (r.width + pad * 2) + 'px';
    hole.style.height = (r.height + pad * 2) + 'px';
    b.style.transform = 'none';
    const bw = b.offsetWidth, bh = b.offsetHeight;
    let top = r.bottom + pad + 12;
    if (top + bh > innerHeight - 12) top = Math.max(12, r.top - pad - bh - 12);
    const left = Math.min(Math.max(12, r.left), innerWidth - bw - 12);
    b.style.top = top + 'px';
    b.style.left = left + 'px';
  }

  window.demoTour = { start };

  // auto-start on first visit, once the console has rendered
  if (!localStorage.getItem(DONE_KEY)) {
    let tries = 0;
    const timer = setInterval(() => {
      if (document.querySelector('[data-testid="client-name"]')) { clearInterval(timer); start(); }
      else if (++tries > 50) clearInterval(timer);
    }, 100);
  }
})();

</script>
</body>
</html>
